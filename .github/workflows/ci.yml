name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: PHP lint & coding standards
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "7.4"
          tools: composer, cs2pr

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: PHP syntax check
        run: |
          find . -name '*.php' -not -path './vendor/*' -not -path './dist/*' -print0 \
            | xargs -0 -n1 -P4 php -l

      - name: PHP_CodeSniffer (WordPress standards)
        run: vendor/bin/phpcs -q --runtime-set ignore_warnings_on_exit 1 --report=checkstyle | cs2pr --graceful-warnings

  plugin-check:
    name: WordPress Plugin Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build distributable plugin (excludes dev files)
        run: bash build.sh

      - name: Run Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          # Check exactly what ships to WordPress.org (dev files excluded).
          build-dir: "./dist/datametric-login-shield"
          # Gate on errors (the WordPress.org hard requirement). Remaining
          # warnings are benign: our own dls_* prefixed hooks that Plugin Check
          # cannot auto-attribute, and $wpdb->prefix table-name interpolation.
          ignore-warnings: true
